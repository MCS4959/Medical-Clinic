<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medic Clinic - Paciente</title>
  <link rel="stylesheet" href="Estilo.css" />

  
  <link rel="icon" type="image/png" href="../Images/logo Medic Clinic top.png">
</head>
<body>
  <header class="cabecalho">
    <div class="logo">
      <img src="../Images/logo Medic Clinic top.png" alt="Logo" class="icone-logo">
      <div class="texto-logo">
        <span class="medic">MEDIC</span><br/>
        <span class="clinic">CLINIC</span>
      </div>
    </div>

    <h1 class="titulo">MEDICO</h1>

    <div class="classicone-usuario">
      <a href="/Login/Login.html"><img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="Usuario"></a>
      <div id="usuarioMenu" class="usuario-menu oculto">
        <p>Perfil</p>
        <p>Configurações</p>
        <p>Sair</p>
      </div>
    </div>
    
  </header>

  <main class="conteudo">
    <div class="opcoes">
      <div class="botao">
        <img src="../Images/Prancheta.png" alt="Exames">
        <p>Gerar relatórios</p>
      </div>

      <div class="botao"  id="btnAtestados">
        <img src="../Images/atestado.png" alt="Atestados">
        <p>Emitir Atestados</p>
      </div>

      <div class="botao"  id="btnMinhasConsultas">
        <img src="../Images/calendario.png" alt="Consultas">
        <p>Minhas consultas</p>
      </div>

    </div>
  </main>

  <script src="Scripts.JS"></script>
</body>
</html>
