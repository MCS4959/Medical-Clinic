<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela de Login e Cadastro</title>
  <link rel="stylesheet" href="teste1.css">
  <link rel="icon" type="image/png" href="../Images/logo Medic Clinic top.png">
</head>
<body>
  <div class="background"></div>

  <div class="login-container">
    <div class="tabs">
      <button id="tabLogin" class="tab active">LOGIN</button>
      <button id="tabCadastro" class="tab">CADASTRO</button>
    </div>

    <!-- Formulário de Login -->
    <form id="loginForm" class="form active">
      <h2>Faça seu login</h2>

      <label for="userType">Tipo de Usuário:</label>
      <select id="userType" required>
        <option value="">Selecione</option>
        <option value="admin">Administrador</option>
        <option value="medico">Médico</option>
        <option value="paciente">Paciente</option>
        <option value="atendente">Atendente</option>
      </select>

      <input type="text" id="username" placeholder="Digite seu nome de usuário" required>
      <input type="password" id="password" placeholder="Digite sua senha" required>

      <button type="submit" class="btn">ENTRAR</button>
      <a href="#" class="link">Esqueci a senha</a>


      <div id="message" style="margin-top:10px;"></div>
    </form>

    <!-- Formulário de Cadastro -->
    <form id="cadastroForm" class="form">
      <h2>Crie sua conta</h2>
      <input type="text" placeholder="Nome completo" required>
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Crie uma senha" required>
      <button type="submit" class="btn">CADASTRAR</button>
    </form>
  </div>

  <script src="teste2.js"></script>
</body>
</html>
