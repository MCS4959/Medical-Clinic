<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medic Clinic - </title>

  <link rel="stylesheet" href="EstiloAgendarConsultas.css" />

  <link rel="icon" type="image/png" href="../../Images/logo Medic Clinic top.png">
</head>
  <header class="cabecalho">
    <div class="logo">
      <img src="../../Images/logo Medic Clinic top.png" alt="Logo" class="icone-logo">
      <div class="texto-logo">
        <span class="medic">MEDIC</span><br/>
        <span class="clinic">CLINIC</span>
      </div>
    </div>

    <h1 class="titulo">Paciente</h1>

    <div class="icone-usuario">
      <a href="../../Login/Login.html">
        <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="Usuário">
      </a>
    </div>
  </header>
<body>
  <div class="cabecalho">
    <div class="logo">
        <div class="icone-logo"></div>
        <div class="texto-logo">
            <div class="titulo">Agendamento</div>
        </div>
    </div>
</div>

<div class="conteudo">
    <div class="container">
        <h2>Agendar Consulta</h2>

        <div class="mensagem" id="mensagem"></div>

        <div id="etapa-especialidade">
            <div class="form-group">
                <label for="especialidade">Especialidade</label>
                <select id="especialidade">
                    <option value="">Selecione a especialidade</option>
                    <option value="cardiologia">Cardiologia</option>
                    <option value="dermatologia">Dermatologia</option>
                    <option value="pediatria">Pediatria</option>
                    <option value="ortopedia">Ortopedia</option>
                </select>
            </div>
        </div>

        <div id="etapa-medico" style="display: none;">
            <div class="form-group">
                <label for="medico">Médico</label>
                <select id="medico">
                    <option value="">Selecione o médico</option>
                </select>
            </div>
        </div>

        <div id="etapa-calendario" class="calendario-container">
            <h3>Selecione um dia</h3>
            <div class="calendario-header">
                <button class="btn-mes" id="btn-anterior">← Anterior</button>
                <div class="mes-ano" id="mes-ano"></div>
                <button class="btn-mes" id="btn-proximo">Próximo →</button>
            </div>
            <div class="dias-semana">
                <div class="dia-semana">Dom</div>
                <div class="dia-semana">Seg</div>
                <div class="dia-semana">Ter</div>
                <div class="dia-semana">Qua</div>
                <div class="dia-semana">Qui</div>
                <div class="dia-semana">Sex</div>
                <div class="dia-semana">Sab</div>
            </div>
            <div class="dias" id="dias-container"></div>
        </div>

        <div id="etapa-paciente" class="formulario-paciente">
            <h3>Dados do Paciente</h3>
            <div class="form-group">
                <label for="nome-paciente">Nome Completo</label>
                <input type="text" id="nome-paciente" placeholder="Digite seu nome completo">
            </div>

            <div class="form-group">
                <label for="telefone-paciente">Telefone</label>
                <input type="tel" id="telefone-paciente" placeholder="(XX) XXXXX-XXXX">
            </div>

            <div class="form-group">
                <label for="email-paciente">Email</label>
                <input type="email" id="email-paciente" placeholder="seu@email.com">
            </div>
        </div>

        <div id="etapa-horarios" class="horarios-container">
            <div class="horarios-label">Horários disponíveis</div>
            <div class="horarios-grid" id="horarios-grid"></div>
        </div>

        <div id="resumo-agendamento"></div>

        <button class="btn-agendar" id="btn-agendar" disabled>Confirmar Agendamento</button>
        <button class="btn-cancelar" id="btn-cancelar" style="display: none;">Cancelar</button>
    </div>
</div>

  <script src="ScriptsAgendarConsultas.js"></script>
</body>
</html>
