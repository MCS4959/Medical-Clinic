<ui:composition
  template="/WEB-INF/template/LayoutPadrao.xhtml"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:h="http://xmlns.jcp.org/jsf/html"
  xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:p="http://primefaces.org/ui">
  
  <html 
  xmlns:p="http://primefaces.org/ui"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:h="http://xmlns.jcp.org/jsf/html"
  xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
  lang="pt-BR">

<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tela de Login e Cadastro</title>

    <h:outputStylesheet library="css" name="teste1.css"/>
    <link rel="icon" type="image/png" href="../Images/logo Medic Clinic top.png"/>
</h:head>

<h:body>

    <div class="background"></div>

    <div class="login-container">

        <div class="tabs">
            <button id="tabLogin" class="tab active" type="button">LOGIN</button>
            <button id="tabCadastro" class="tab" type="button">CADASTRO</button>
        </div>

        <!-- FORM LOGIN -->
        <h:form id="loginForm" styleClass="form active">

            <h2>Faça seu login</h2>

            <h:inputText
                id="username"
                required="true"
                pt:placeholder="Digite seu nome de usuário"/>

            <h:inputSecret
                id="password"
                required="true"
                pt:placeholder="Digite sua senha"/>

            <h:commandButton
                value="ENTRAR"
                styleClass="btn"/>

            <a href="#" class="link">Esqueci a senha</a>

            <div id="message" style="margin-top:10px;"></div>

        </h:form>


        <!-- FORM CADASTRO -->
        <h:form id="cadastroForm" styleClass="form">

            <h2>Crie sua conta</h2>

            <h:inputText pt:placeholder="Nome completo" required="true"/>

            <h:inputText pt:placeholder="Email" required="true"/>

            <h:inputSecret pt:placeholder="Crie uma senha" required="true"/>

            <h:commandButton
                value="CADASTRAR"
                styleClass="btn"/>

        </h:form>

    </div>>

</h:body>
</html>
  
</ui:composition>
