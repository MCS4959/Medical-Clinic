<ui:composition
  template="/WEB-INF/template/LayoutPadrao.xhtml"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:h="http://xmlns.jcp.org/jsf/html"
  xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:p="http://primefaces.org/ui">
 
  
	  <ui:define name="titulo">MC-Web</ui:define>
	  
	  <ui:define name="corpo">
    <h:form id="formulario">
        <p:messages id="msgs"/>
        
        <p:toolbar style="margin-top: 20px">
				<p:toolbarGroup>
					<p:commandButton icon="pi pi-plus" value="Novo" id="botaoNovo" 
						oncomplete="PF('editarDialogWidgetVar').show()"
		            	update="editarDialog"	
						actionListener="#{cadastrarUsuarioBean.limpar}"	            	
		            	process="@this"/>

				</p:toolbarGroup>
			</p:toolbar>	
	  
	   <p:dataTable id="usuariosTable" var="usuario" value="#{cadastrarUsuarioBean.usuarios}"
				lazy="false" showGridlines="true"
	    		style="margin-top: 20px" emptyMessage="Nenhum usuario encontrado." rows="10"
	    		paginator="true" paginatorAlwaysVisible="true" paginatorPosition="bottom"
	    		rowsPerPageTemplate="5,10,15">		

				<p:column headerText="Id">
					<h:outputText value="#{usuario.id}" />
				</p:column>
				
				<p:column headerText="Perfil"
				    filterBy="#{usuario.perfil}" sortBy="#{usuario.perfil}">
					<h:outputText value="#{usuario.perfil}" />
				</p:column>

				<p:column headerText="Nome"
					filterBy="#{usuario.nome}" sortBy="#{usuario.nome}">
					<h:outputText value="#{usuario.nome}" />
				</p:column>
				
				<p:column headerText="EMAIL">
					<h:outputText value="#{usuario.email}" />
				</p:column>
				
				<p:column headerText="Telefone">
					<h:outputText value="#{usuario.telefone}" />
				</p:column>

				<p:column headerText="Especialidade">
					<h:outputText value="#{usuario.especialidade}" />
				</p:column>

				<p:column headerText="Operações">					
					
					<p:commandButton id="cb1" icon="pi pi-pencil" title="Editar"	    				
		            	oncomplete="PF('editarDialogWidgetVar').show()"
		            	update=":formulario:editarDialog"		            	
		            	process="@this">
		            	<f:setPropertyActionListener target="#{cadastrarUsuarioBean.usuario}" 
							value="#{usuario}" />
	            	</p:commandButton>

					<p:commandButton icon="pi pi-trash"  title="Excluir"
						onclick="PF('confirmacaoExclusao').show();"
						process="@this"	>
						<f:setPropertyActionListener target="#{cadastrarUsuarioBean.usuario}"
							value="#{usuario}" />
					</p:commandButton>
				</p:column>

			</p:dataTable>
			
       <p:dialog id="editarDialog" header="Cadastro" widgetVar="editarDialogWidgetVar"
				modal="true" resizable="true" closeOnEscape="true"
				showEffect="explode" hideEffect="explode" 
				width="100%" position="center top" maximizable="true"
				height="70%" fitViewport="true" responsive="true">
				
         <p:panelGrid id="grid" columns="2">       
       		
       		<p:outputLabel for="perfil" value="Perfil: " />
				<p:selectOneMenu id="perfil" value="#{cadastrarUsuarioBean.usuario.perfil}">
					<f:selectItem itemLabel="Selecione um perfil"/>
					<f:selectItems value="#{cadastrarUsuarioBean.perfis}"
						var="perfil" itemLabel="#{perfil}"
						itemValue="#{perfil}"
						/>
					<p:ajax update="grid" process="@this"/>
				</p:selectOneMenu>
				
			<p:outputLabel for="especialidade" value="Especialidade: " rendered="#{cadastrarUsuarioBean.usuario.perfil eq 'MEDICO'}"/>
				<p:selectOneMenu id="especialidade" value="#{cadastrarUsuarioBean.usuario.especialidade}" rendered="#{cadastrarUsuarioBean.usuario.perfil eq 'MEDICO'}">
					<f:selectItem itemLabel="Selecione uma especialidade"/>
					<f:selectItems value="#{cadastrarUsuarioBean.especialidades}"
						var="especialidade" itemLabel="#{especialidade}"
						itemValue="#{especialidade}"
						/>
					<p:ajax update="grid" process="@this"/>
				</p:selectOneMenu>
        
        	<p:outputLabel for="nome" value="Nome: "/>
            <p:inputText id="nome" value="#{cadastrarUsuarioBean.usuario.nome}" required="true"/>
            
            <p:outputLabel for="firstname" value="Email: "/> 
            <p:inputText id="firstname" value="#{cadastrarUsuarioBean.usuario.email}" required="true" label="Firstname"/>
        

            <p:outputLabel for="senha" value="Senha: "/> 
            <p:password id="senha" value="#{cadastrarUsuarioBean.usuario.senha}" required="true"/>

           	<p:outputLabel for="telefone" value="Telefone: " />
           	<p:inputMask id="telefone" value="#{cadastrarUsuarioBean.usuario.telefone}" mask="(99) 99999-9999" validateMask="true" />
           	
        	<p:outputLabel for="crm" value="Crm: " rendered="#{cadastrarUsuarioBean.usuario.perfil eq 'MEDICO'}" />
			<p:inputMask id="crm" value="#{cadastrarUsuarioBean.usuario.crm}" required="true" rendered="#{cadastrarUsuarioBean.usuario.perfil eq 'MEDICO'}" mask="999999/aa" placeHolder="000000/UF" validateMask="true"/>
        	
        	<p:commandButton value="Salvar" 
	        	update="msgs usuariosTable" process="@this grid" 
	        	actionListener="#{cadastrarUsuarioBean.salvar}" icon= "pi pi-save"
	        	oncomplete="setTimeout(function() { $('.ui-messages').slideUp(); }, 5000);"/>

        	
        	 
          </p:panelGrid>
          
        </p:dialog>
        
        <p:confirmDialog id="confirmacaoExclusaoDialog"
				widgetVar="confirmacaoExclusao"
				message="Tem certeza que deseja excluir o usuario #{cadastrarUsuarioBean.usuario.nome}?"
				header="Exclusão de usuário" severity="alert">
				<p:button icon="pi pi-thumbs-down" value="Não"
					onclick="PF('confirmacaoExclusao').hide(); return false;" 
					process="@this"/>
				<p:commandButton icon="pi pi-thumbs-up" value="Sim" 
				    update=":formulario:usuariosTable"
					onclick="PF('confirmacaoExclusao').hide();"
					action="#{cadastrarUsuarioBean.excluir}"
					process="@this"/>
			</p:confirmDialog>
			
    </h:form>
</ui:define>
  
</ui:composition>
