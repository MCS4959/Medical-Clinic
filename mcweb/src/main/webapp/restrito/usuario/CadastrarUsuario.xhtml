<ui:composition
  template="/WEB-INF/template/LayoutPadrao.xhtml"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:h="http://xmlns.jcp.org/jsf/html"
  xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:p="http://primefaces.org/ui">
 
  
	  <ui:define name="titulo">MC-Web</ui:define>
	  
	  <ui:define name="corpo">
    <h:form>
        <p:messages id="msgs"/>

       <p:panelGrid id="grid" columns="2">       
       		
       		<p:outputLabel for="perfil" value="Perfil: " />
				<p:selectOneMenu id="perfil" value="#{cadastrarUsuarioBean.usuario.perfil}">
					<f:selectItem itemLabel="Selecione um perfil"/>
					<f:selectItems value="#{cadastrarUsuarioBean.perfis}"
						var="perfil" itemLabel="#{perfil}"
						itemValue="#{perfil}"
						/>
					<p:ajax update="grid" process="@this"/>
				</p:selectOneMenu>
				
			<p:outputLabel for="especialidade" value="Especialidade: " rendered="#{cadastrarUsuarioBean.usuario.perfil eq 'MEDICO'}"/>
				<p:selectOneMenu id="especialidade" value="#{cadastrarUsuarioBean.usuario.especialidade}" rendered="#{cadastrarUsuarioBean.usuario.perfil eq 'MEDICO'}">
					<f:selectItem itemLabel="Selecione uma especialidade"/>
					<f:selectItems value="#{cadastrarUsuarioBean.especialidades}"
						var="especialidade" itemLabel="#{especialidade}"
						itemValue="#{especialidade}"
						/>
					<p:ajax update="grid" process="@this"/>
				</p:selectOneMenu>
        
        	<p:outputLabel for="nome" value="Nome: "/>
            <p:inputText id="nome" value="#{cadastrarUsuarioBean.usuario.nome}" required="true"/>
            
            <p:outputLabel for="firstname" value="Email: "/> 
            <p:inputText id="firstname" value="#{cadastrarUsuarioBean.usuario.email}" required="true" label="Firstname"/>
        

            <p:outputLabel for="senha" value="Senha: "/> 
            <p:password id="senha" value="#{cadastrarUsuarioBean.usuario.senha}" required="true"/>

           	<p:outputLabel for="telefone" value="Telefone: " />
           	<p:inputMask id="telefone" value="#{cadastrarUsuarioBean.usuario.telefone}" mask="(99) 99999-9999" validateMask="true" />
           	
        	<p:outputLabel for="crm" value="Crm: " rendered="#{cadastrarUsuarioBean.usuario.perfil eq 'MEDICO'}" />
			<p:inputMask id="crm" value="#{cadastrarUsuarioBean.usuario.crm}" required="true" rendered="#{cadastrarUsuarioBean.usuario.perfil eq 'MEDICO'}" mask="999999/aa" placeHolder="000000/UF" validateMask="true"/>
        	
        	<p:commandButton value="Save" 
	        	update="msgs grid" process="@this grid" 
	        	actionListener="#{cadastrarUsuarioBean.salvar}" icon= "pi pi-save"
	        	oncomplete="setTimeout(function() { $('.ui-messages').slideUp(); }, 5000);"/>
        	
        	
        	 
        </p:panelGrid>
    </h:form>
</ui:define>
  
</ui:composition>
