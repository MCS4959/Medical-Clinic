<ui:composition template="/WEB-INF/template/LayoutPadrao.xhtml" xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets" xmlns:p="http://primefaces.org/ui">

	<ui:define name="titulo">Teste</ui:define>

	<ui:define name="corpo">
		<h:form>
			<p:messages id="msgs" />

			<h:panelGrid columns="3" cellpadding="7" styleClass="mb-3">
				<p:outputLabel for="firstname" value="Email: " />
				<p:inputText id="firstname" value="#{loginBean.usuario.email}" required="true" label="Firstname">
					<f:validateLength minimum="2" />
				</p:inputText>
				<p:message for="firstname" display="icon" />

				<p:outputLabel for="senha" value="Senha: " />
				<p:password id="senha" value="#{loginBean.usuario.senha}">
					<f:validateLength minimum="2" />
				</p:password>

			</h:panelGrid>
			<p:button value="Cadastro" outcome="/login/Cadastro.xhtml" />

			<p:commandButton value="Save" update="@form" action="#{loginBean.login}" icon="pi pi-check" />
		</h:form>
	</ui:define>

</ui:composition>
