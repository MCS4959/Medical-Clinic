<ui:composition
  template="/WEB-INF/template/LayoutTelaInicial.xhtml"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:h="http://xmlns.jcp.org/jsf/html"
  xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:p="http://primefaces.org/ui">
  
	  <ui:define name="titulo">MC-Web</ui:define>
	  
	  <ui:define name="corpo">
	  <p:menubar>
		<f:facet name="start">
			<p:graphicImage name="logo_mcweb.png" library="imagens" style="width: 80px;  border-radius:50%;" styleClass="mb-3"/>
		</f:facet>
		
		<p:menuitem value="Home" url="http://localhost:8080/mcweb"/>							
		<p:divider layout="vertical"/>
		<p:menuitem value="Sair" icon="pi pi-fw pi-power-off" actionListener="#{loginBean.sair}"/>
		
		<f:facet name="right">
			<p:button value="Entrar" outcome="/restrito/home.xhtml" />
		</f:facet>
	</p:menubar> 
		 
	</ui:define>
</ui:composition>
