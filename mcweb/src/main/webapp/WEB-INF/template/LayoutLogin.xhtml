<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
	"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
	
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
	  xmlns:f="http://xmlns.jcp.org/jsf/core">	
     
	
<h:head>
    <title>TesteApp</title>
     <h:outputStylesheet library="css" name="LayoutLogin.css" />

</h:head>
			
<h:body>

	<p:menubar>
		<f:facet name="start">
		<p:graphicImage name="logo_mcweb.png" library="imagens" style="width: 80px;  border-radius:50%;" styleClass="mb-3"/>
		</f:facet>
		<p:menuitem value="Home" url="http://localhost:8080/mcweb"/>							
		<p:divider layout="vertical"/>
		<p:menuitem value="Sair" icon="pi pi-fw pi-power-off" actionListener="#{loginBean.sair}"/>
	</p:menubar> 
						
    <div class="container">

        <div class="card" id="conteudo">			
            <ui:insert name="corpo" />
        </div>

    </div>

    <div id="footer">
        <ui:include src="Footer.xhtml" />
    </div>	 

</h:body>
</html>
