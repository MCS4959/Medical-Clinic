<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medic Clinic - Administrador</title>
  <link rel="stylesheet" href="Estilo.css" />
  <link rel="icon" type="image/png" href="../Images/logo Medic Clinic top.png">
</head>
<body>
  <header class="cabecalho">
    <div class="logo">
      <img src="../Images/logo Medic Clinic top.png" alt="Logo" class="icone-logo">
      <div class="texto-logo">
        <span class="medic">MEDIC</span><br/>
        <span class="clinic">CLINIC</span>
      </div>
    </div>

    <h1 class="titulo">Administrador</h1>

    <div class="icone-usuario">
      <a href="../Login/Login.html">
        <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="Usuário">
      </a>
    </div>
  </header>

  <main class="conteudo">
    <div class="opcoes">

      
      <div class="botao" id="btnCadastrar">
        <img src="../Images/Prancheta.png" alt="Exames">
        <p>Cadastrar Funcionário</p>
      </div>

    
      <div class="botao" id="btnRelatorio">
        <img src="../Images/calendario.png" alt="Consultas">
        <p>Gerar Relatório</p>
      </div>

    </div>
  </main>

  <script src="Scripts.js"></script> 
</body>
</html>
