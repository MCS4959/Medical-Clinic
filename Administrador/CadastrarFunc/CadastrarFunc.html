<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medic Clinic - Administrador</title>

  <link rel="stylesheet" href="EstiloCadastrar.css" />

  <link rel="icon" type="image/png" href="../../Images/logo Medic Clinic top.png">
</head>

<body>
  <header class="cabecalho">
    <div class="logo">
      <img src="../../Images/logo Medic Clinic top.png" alt="Logo" class="icone-logo">
      <div class="texto-logo">
        <span class="medic">MEDIC</span><br/>
        <span class="clinic">CLINIC</span>
      </div>
    </div>

    <h1 class="titulo">Administrador</h1>

    <div class="icone-usuario">
      <a href="../Login/Login.html">
        <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="Usuário">
      </a>
    </div>
  </header>

  <div class="controle-tabela">
  <input type="text" id="pesquisa" placeholder="Pesquisar funcionário...">

  <select id="filtroCargo">
    <option value="">Todos os cargos</option>
    <option value="Médico">Médico</option>
    <option value="Atendente">Atendente</option>
    <option value="Enfermeiro">Enfermeiro</option>
    <option value="Outro">Outro</option>
  </select>
</div>


  <h1>Cadastrar Funcionário</h1>

  <button id="abrirModal">Adicionar Funcionário</button>

  <!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-conteudo">
        <span id="fecharModal" class="fechar">&times;</span>
        <h2>Adicionar Funcionário</h2>
        
        <form id="formFuncionario">
            <label>Nome:</label>
            <input type="text" id="nome" required><br/>

            <label>ID:</label>
            <input type="text" id="id" required><br/>

            <label>CPF:</label>
            <input type="text" id="cpf" required><br/>

            <label>Data de Nascimento:</label>
            <input type="date" id="nascimento" required><br/>

            <label>Especialidade / Cargo:</label>
            <input type="text" id="cargo" required><br/>

            <div class="botoes-modal">
                <button type="submit" id="btnSalvar">Salvar</button>
                <button type="button" id="btnCancelar">Cancelar</button>
            </div>
        </form>
    </div>
</div>

    <div class="exportar-container">
    <button id="exportarPDF">Exportar PDF</button>
    <button id="exportarExcel">Exportar Excel</button>
</div>


  <div class="tabela-container">
  <table class="tabela tabela-medic" id="tabelaFuncionarios">
    <thead>
      <tr>
        <th data-col="nome">Nome ⬍</th>
        <th data-col="id">ID ⬍</th>
        <th data-col="cpf">CPF ⬍</th>
        <th data-col="nasc">Nascimento ⬍</th>
        <th data-col="cargo">Cargo ⬍</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div id="paginacao" class="paginacao"></div>



  <script src="ScriptsCadastrar.js"></script>
</body>
</html>
