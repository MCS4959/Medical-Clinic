<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medic Clinic - Paciente</title>
  <link rel="stylesheet" href="Estilo.css" />
</head>
<body>
  <header class="cabecalho">
    <div class="logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Medical_Cross.svg" alt="Logo" class="icone-logo">
      <div class="texto-logo">
        <span class="medic">MEDIC</span><br/>
        <span class="clinic">CLINIC</span>
      </div>
    </div>

    <h1 class="titulo">PACIENTE</h1>

    <div class="icone-usuario">
      <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="Usuário">
    </div>
  </header>

  <main class="conteudo">
    <div class="opcoes">
      <div class="botao">
        <img src="https://cdn-icons-png.flaticon.com/512/1828/1828817.png" alt="Exames">
        <p>Resultados dos exames</p>
      </div>

      <div class="botao">
        <img src="https://cdn-icons-png.flaticon.com/512/1828/1828817.png" alt="Atestados">
        <p>Atestados</p>
      </div>

      <div class="botao">
        <img src="https://cdn-icons-png.flaticon.com/512/1828/1828817.png" alt="Consultas">
        <p>Minhas consultas</p>
      </div>

      <div class="botao">
        <img src="https://cdn-icons-png.flaticon.com/512/1828/1828817.png" alt="Agendar">
        <p>Agendar consulta</p>
      </div>
    </div>
  </main>

  <script src="Scripts.JS"></script>
</body>
</html>
